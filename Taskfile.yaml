version: '3'

dotenv: ['.env']

vars:
  NAME: '{{.NAME | default "GridTrading"}}'

tasks:
  build:
    desc: Upload, compile, and download {{.NAME}}
    cmds:
      - task: upload
      - task: compile
      - task: download

  upload:
    desc: Upload {{.NAME}}.mq5 to remote server
    cmds:
      - scp {{.NAME}}.mq5 {{.REMOTE_HOST}}:/tmp/{{.NAME}}.mq5
      - ssh {{.REMOTE_HOST}} "sudo mv /tmp/{{.NAME}}.mq5 {{.REMOTE_DIR}}/"

  compile:
    desc: Compile {{.NAME}}.mq5 on remote MT5 server via Docker
    cmds:
      - |
        ssh {{.REMOTE_HOST}} bash -s <<'EOF'
        cd /docker
        docker compose exec -T mt5-1 su - abc -c 'wine ".wine/drive_c/Program Files/MetaTrader 5/MetaEditor64.exe" /compile:"C:\users\abc\Documents\{{.NAME}}.mq5"' || true
        EOF

  download:
    desc: Download compiled {{.NAME}}.ex5 from remote server
    cmds:
      - ssh {{.REMOTE_HOST}} "sudo cp {{.REMOTE_DIR}}/{{.NAME}}.ex5 /tmp/ && sudo chmod 644 /tmp/{{.NAME}}.ex5"
      - mkdir -p bin
      - scp {{.REMOTE_HOST}}:/tmp/{{.NAME}}.ex5 bin/

  deploy:
    desc: Copy bin/{{.NAME}}.ex5 to local MT5 directory
    cmds:
      - cp bin/{{.NAME}}.ex5 {{.MT5_EXPERTS_DIR}}/

  start:
    desc: Start mt5-1 container on remote server
    cmds:
      - ssh {{.REMOTE_HOST}} "cd /docker && docker compose up -d mt5-1"

  stop:
    desc: Stop mt5-1 container on remote server
    cmds:
      - ssh {{.REMOTE_HOST}} "cd /docker && docker compose stop mt5-1"
